name: PUBLISH

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# OIDC permissions to allow publishing to npm registry
permissions:
  id-token: write
  contents: read

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Install packages
        run: npm install

      - name: Verify source
        run: npm run preversion

      - name: Build source
        run: npm run build

      - name: Publish packages to npm registry
        run: npm publish --access public
